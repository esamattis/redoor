<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReDoor Agent Controller</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 50px auto;
            padding: 20px;
        }
        h1 {
            color: #333;
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
        }
        .panel {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            background: #f9f9f9;
        }
        .panel h2 {
            margin-top: 0;
            color: #555;
            font-size: 18px;
        }
        #agentList {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .agent-item {
            padding: 10px;
            margin: 5px 0;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .agent-item:hover {
            background: #e9ecef;
        }
        .agent-item.selected {
            background: #007bff;
            color: white;
            border-color: #0056b3;
        }
        #output {
            height: 300px;
            border: 1px solid #ccc;
            background: #fff;
            overflow-y: scroll;
            padding: 10px;
            margin: 10px 0;
            font-family: 'Courier New', monospace;
            font-size: 13px;
        }
        .output-line {
            margin: 3px 0;
            padding: 3px 5px;
            border-radius: 3px;
        }
        .output-command {
            background: #e3f2fd;
            color: #1976d2;
        }
        .output-response {
            background: #f5f5f5;
            color: #333;
            white-space: pre-wrap;
        }
        .output-error {
            background: #ffebee;
            color: #c62828;
        }
        .input-group {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #0056b3;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        #status {
            margin-bottom: 20px;
            font-weight: bold;
        }
        .connected { color: green; }
        .disconnected { color: red; }
        #selectedAgent {
            margin-bottom: 15px;
            padding: 10px;
            background: #e3f2fd;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <h1>ReDoor Agent Controller</h1>
    
    <div id="status" class="disconnected">Disconnected</div>
    
    <div class="container">
        <div class="panel">
            <h2>Connected Agents</h2>
            <ul id="agentList"></ul>
        </div>
        
        <div class="panel">
            <h2>Command Console</h2>
            
            <div id="selectedAgent">
                <strong>Selected Agent:</strong> <span id="selectedAgentName"></span>
            </div>
            
            <div id="output"></div>
            
            <div class="input-group">
                <input type="text" id="commandInput" placeholder="Enter command (e.g., ls /tmp)" disabled />
                <button id="sendBtn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
        
        const statusDiv = document.getElementById('status');
        const agentList = document.getElementById('agentList');
        const output = document.getElementById('output');
        const commandInput = document.getElementById('commandInput');
        const sendBtn = document.getElementById('sendBtn');
        const selectedAgentDiv = document.getElementById('selectedAgent');
        const selectedAgentName = document.getElementById('selectedAgentName');
        
        let agents = {};
        let selectedAgent = null;
        let pendingCommands = {};

        ws.onopen = () => {
            statusDiv.textContent = 'Connected';
            statusDiv.className = 'connected';
        };

        ws.onmessage = (event) => {
            try {
                const msg = JSON.parse(event.data);
                
                switch (msg.type) {
                    case 'agent_list':
                        agents = msg.agents;
                        renderAgentList();
                        break;
                        
                    case 'command_response':
                        handleCommandResponse(msg);
                        break;
                        
                    case 'error':
                        addOutput(msg.message, 'error');
                        break;
                }
            } catch (e) {
                console.error('Error parsing message:', e);
            }
        };

        ws.onclose = () => {
            statusDiv.textContent = 'Disconnected';
            statusDiv.className = 'disconnected';
            commandInput.disabled = true;
            sendBtn.disabled = true;
        };

        ws.onerror = (error) => {
            console.error('WebSocket error:', error);
        };

        function renderAgentList() {
            agentList.innerHTML = '';
            
            const agentIds = Object.keys(agents);
            
            if (agentIds.length === 0) {
                agentList.innerHTML = '<li style="color: #999; padding: 10px;">No agents connected</li>';
                return;
            }
            
            agentIds.forEach(agentId => {
                const li = document.createElement('li');
                li.className = 'agent-item';
                if (selectedAgent === agentId) {
                    li.classList.add('selected');
                }
                li.textContent = agents[agentId];
                li.onclick = () => selectAgent(agentId, agents[agentId]);
                agentList.appendChild(li);
            });
        }

        function selectAgent(agentId, agentName) {
            selectedAgent = agentId;
            selectedAgentName.textContent = agentName;
            selectedAgentDiv.style.display = 'block';
            commandInput.disabled = false;
            sendBtn.disabled = false;
            commandInput.focus();
            renderAgentList();
        }

        function addOutput(text, type = 'response') {
            const line = document.createElement('div');
            line.className = `output-line output-${type}`;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function handleCommandResponse(msg) {
            const pendingId = msg.agent_id;
            const pending = pendingCommands[pendingId];
            
            if (pending) {
                if (msg.result.error) {
                    addOutput(`Error: ${msg.result.error}`, 'error');
                } else if (msg.result.files) {
                    addOutput(`Files:\n${msg.result.files.join('\n')}`, 'response');
                } else {
                    addOutput(JSON.stringify(msg.result, null, 2), 'response');
                }
                delete pendingCommands[pendingId];
            }
        }

        function sendCommand() {
            const input = commandInput.value.trim();
            if (!input || !selectedAgent) return;
            
            const parts = input.split(/\s+/);
            const command = parts[0];
            const args = parts.slice(1);
            
            const msg = {
                type: 'command',
                agent_id: selectedAgent,
                command: command,
                args: args
            };
            
            pendingCommands[selectedAgent] = true;
            ws.send(JSON.stringify(msg));
            
            addOutput(`$ ${input}`, 'command');
            commandInput.value = '';
        }

        sendBtn.onclick = sendCommand;

        commandInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendCommand();
            }
        });
    </script>
</body>
</html>
