# redoor server config file. Pass with: redoor server --config config.toml

[server]
# port = 3006          # optional; also settable via --port / REDOOR_PORT
# bind = "0.0.0.0"     # optional; default 0.0.0.0
# log = "log/server.log" # optional; also settable via --log

[[agents]]
target = "devbox"
remote_bin = "/home/esamatti/code/redoor/target/debug/redoor"
dir = "/home"
log = "log/devbox.log"   # optional; redirects the agent's stdout/stderr to this local file

[[agents]]
name = "local"
local = true
dir = "/Users/esamatti/tmp"
log = "log/local.log"    # optional; redirects the agent's stdout/stderr to this file
